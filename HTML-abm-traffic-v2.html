        <div style={{ width: 8, height: 8, borderRadius: "50%", background: V_running ? "#22c55e" : "#ef4444" }} />
        <span style={{ fontSize: 14, fontWeight: 700, color: "#f59e0b", letterSpacing: 2 }}>ABM</span>
        <span style={{ fontSize: 14, letterSpacing: 1 }}>TRAFFIC SIM</span>
        <span style={{ fontSize: 10, color: mu, padding: "2px 6px", background: "#1a1815", borderRadius: 2 }}>v2.2</span>
        <div style={{ marginLeft: "auto", fontSize: 12, color: mu, display: "flex", gap: 12 }}>
          <span style={{ color: "#f59e0b", fontWeight: 700, fontSize: 14 }}>{F_tickToTimeStr(V_tick)}</span>
          <span>Tick {V_tick}/{P_TOTAL_TICKS}</span>
        </div>
      </div>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {/* ── LEFT: Map + Metrics + Chart ── */}
        <div style={{ flex: "1 1 62%", display: "flex", flexDirection: "column" }}>
          {/* Canvas */}
          <div style={{ flex: "1 1 auto", minHeight: 0 }}>
            <canvas ref={V_canvasRef} onClick={F_clickCanvas}
              style={{ width: "100%", height: "100%", cursor: "crosshair", display: "block" }} />
          </div>

          {/* S_ Metrics strip (always visible) */}
          <div style={{ flexShrink: 0, background: "#0a0a09", borderTop: "1px solid #262320", padding: "6px 10px", display: "flex", gap: 4, flexWrap: "wrap", fontSize: 11 }}>
            <MetricBadge label="On Arterials" value={V_stats?.S_arterialNow ?? "—"} color="#f59e0b" />
            <MetricBadge label="Peak" value={V_stats?.S_peakArterial ?? "—"} />
            <MetricBadge label="Avg All" value={V_stats ? V_stats.S_avgTripAll + " min" : "—"} />
            <MetricBadge label="Avg Arterial" value={V_stats ? V_stats.S_avgTripArterial + " min" : "—"} color="#ef4444" />
            <MetricBadge label="Avg Local" value={V_stats ? V_stats.S_avgTripLocal + " min" : "—"} color="#9ca3af" />
            <MetricBadge label="Avg Baseline" value={V_stats ? V_stats.S_avgTripBaseline + " min" : "—"} color="#3b82f6" />
            <MetricBadge label="Done" value={V_stats ? `${V_stats.S_completedTrips}/${V_stats.S_totalTrips}` : "—"} />
            <MetricBadge label="🔴 Bright" value={V_stats?.S_brightRedActive ?? 0} color="#ef4444" />
            <MetricBadge label="🟤 Dark" value={V_stats?.S_darkRedActive ?? 0} color="#991b1b" />
            <MetricBadge label="🔵 Base" value={V_stats?.S_blueActive ?? 0} color="#3b82f6" />
            <MetricBadge label="⚪ Local" value={V_stats?.S_grayActive ?? 0} color="#9ca3af" />
          </div>

          {/* Stacked area chart (FIX 2.3: pixel-based, fill-only, properly stacked) */}
          <div ref={V_chartRef} style={{ flexShrink: 0, padding: "4px 8px 6px", background: "#0a0a09", borderTop: "1px solid #262320" }}>
            <div style={{ background: "#141210", border: "1px solid #262320", borderRadius: 4, padding: "8px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: mu, letterSpacing: 1 }}>ARTERIAL LOAD OVER TIME</span>
                <span style={{ fontSize: 13, fontWeight: 700 }}>Net increase: <span style={{ color: V_totalCrossDist > 0 ? "#ef4444" : mu }}>+{S_netIncreasePct}%</span></span>
              </div>
              <svg width="100%" height={chartH} viewBox={`0 0 ${chartW} ${chartH}`} preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
                {/* Y-axis grid lines and labels */}
                {[0, 0.25, 0.5, 0.75, 1].map((frac, i) => {
                  const yPos = F_valToY(V_maxChartVal * frac);
                  return <React.Fragment key={`y${i}`}>
                    <line x1={chartLeft} y1={yPos} x2={chartRight} y2={yPos} stroke="#1e1c18" strokeWidth="1" />
                    <text x={chartLeft - 4} y={yPos + 4} fill="#999" fontSize="11" fontFamily="monospace" textAnchor="end">{Math.round(V_maxChartVal * frac)}</text>
                  </React.Fragment>;
                })}

                {/* X-axis grid lines and time labels */}
                {[5.5, 6, 6.5, 7, 7.5, 8].map((hour, i) => {
                  const xPos = F_tickToX(((hour - P_START_HOUR) * 60 / (P_TICK_SECONDS / 60)));
                  const label = `${Math.floor(hour)}:${String((hour % 1) * 60).padStart(2, "0")}`;
                  return <React.Fragment key={`x${i}`}>
                    <line x1={xPos} y1={chartTop} x2={xPos} y2={chartBottom} stroke="#1e1c18" strokeWidth="1" />
                    <text x={xPos} y={chartBottom + 16} fill="#999" fontSize="11" fontFamily="monospace" textAnchor="middle">{label}</text>
                  </React.Fragment>;
                })}

                {/* LAYER 1: Blue filled area (baseline) — from x-axis up to baseline values */}
                {V_baselinePoints.length > 1 && (
                  <polygon
                    points={`${V_baselinePoints[0][0]},${chartBottom} ${V_baselinePoints.map(p => p.join(",")).join(" ")} ${V_baselinePoints[V_baselinePoints.length - 1][0]},${chartBottom}`}
                    fill="rgba(59,130,246,0.35)" stroke="none" />
                )}

                {/* LAYER 2: Red filled area (cross-district) — stacked ON TOP of blue.
                    Bottom edge follows the baseline curve, top edge is the stacked total. */}
                {V_stackedPoints.length > 1 && V_baselinePoints.length > 1 && (
                  <polygon
                    points={`${V_stackedPoints.map(p => p.join(",")).join(" ")} ${[...V_baselinePoints].reverse().map(p => p.join(",")).join(" ")}`}
                    fill="rgba(239,68,68,0.4)" stroke="none" />
                )}

                {/* Current time marker */}
                <line x1={F_tickToX(V_tick)} y1={chartTop} x2={F_tickToX(V_tick)} y2={chartBottom}
                  stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3" />

                {/* Axis titles */}
                <text x={chartLeft + chartDataW / 2} y={chartH - 4} fill="#777" fontSize="11" fontFamily="monospace" textAnchor="middle">Time (5:30 AM → 8:00 AM)</text>
                <text x={chartLeft} y={chartTop - 4} fill="#777" fontSize="11" fontFamily="monospace">Cars on Arterials</text>
              </svg>
              <div style={{ display: "flex", gap: 14, marginTop: 4, fontSize: 11, color: mu }}>
                <span><span style={{ display: "inline-block", width: 12, height: 4, background: "rgba(59,130,246,0.5)", marginRight: 4, verticalAlign: "middle" }} />Baseline</span>
                <span><span style={{ display: "inline-block", width: 12, height: 4, background: "rgba(239,68,68,0.5)", marginRight: 4, verticalAlign: "middle" }} />Cross-district (+{S_netIncreasePct}%)</span>
              </div>
            </div>
          </div>
        </div>

        {/* ── RIGHT: All controls (single scrollable page) ── */}
        <div style={{ flex: "0 0 300px", background: "#131210", borderLeft: "1px solid #262320", overflowY: "auto", padding: "8px 10px", fontSize: 11 }}>
          {/* Action buttons */}
          <div style={{ display: "flex", gap: 2, marginBottom: 6 }}>
            <ActionBtn onClick={() => { if (!V_simRef.current || V_simRef.current.V_cars.every(c => c.done)) F_initSim(); setV_running(!V_running); }}
              accent={V_running ? "#dc2626" : "#f59e0b"} label={V_running ? "⏸ PAUSE" : "▶ RUN"} />
            <ActionBtn onClick={F_reset} label="↺ RESET" />
            <ActionBtn onClick={F_step} label="→ STEP" />
          </div>

          {/* Speed selector */}
          <div style={{ marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: mu }}>Speed: </span>
            <select value={P_simSpeed} onChange={e => setP_simSpeed(Number(e.target.value))}
              style={{ fontSize: 11, padding: "3px 6px", borderRadius: 3, border: "1px solid #262320", background: "#1a1815", color: "#ddd" }}>
              <option value={0.25}>0.25× (very slow)</option>
              <option value={0.5}>0.5× (slow)</option>
              <option value={1}>1× (normal)</option>
              <option value={2}>2× (fast)</option>
              <option value={4}>4×</option>
              <option value={8}>8×</option>
              <option value={10}>10× (max)</option>
            </select>
          </div>

          {/* Toggle buttons */}
          <div style={{ display: "flex", gap: 3, marginBottom: 6 }}>
            <button onClick={() => setP_allRedLights(!P_allRedLights)}
              style={{ flex: 1, padding: 5, fontSize: 11, fontWeight: 700, background: P_allRedLights ? "#7f1d1d" : "#1a1815", color: P_allRedLights ? "#fca5a5" : mu, border: "1px solid #262320", borderRadius: 3, cursor: "pointer" }}>
              {P_allRedLights ? "🔴 ALL RED ON" : "🚦 Normal TL"}
            </button>
            <button onClick={() => setP_randomSchoolLocs(!P_randomSchoolLocs)}
              style={{ flex: 1, padding: 5, fontSize: 11, background: P_randomSchoolLocs ? "#1e3a2e" : "#1a1815", color: P_randomSchoolLocs ? "#86efac" : mu, border: "1px solid #262320", borderRadius: 3, cursor: "pointer" }}>
              {P_randomSchoolLocs ? "🎲 Random locs" : "📍 Center locs"}
            </button>
            <button onClick={() => { setV_showRoadLabels(!V_showRoadLabels); setTimeout(() => F_render(), 30); }}
              style={{ flex: 1, padding: 5, fontSize: 11, fontWeight: 700, background: V_showRoadLabels ? "#1e293b" : "#1a1815", color: V_showRoadLabels ? "#93c5fd" : mu, border: "1px solid #262320", borderRadius: 3, cursor: "pointer" }}>
              {V_showRoadLabels ? "🏷️ Labels ON" : "🏷️ Labels"}
            </button>
          </div>

          {/* Seed controls */}
          <div style={{ marginBottom: 6, padding: "6px 8px", background: P_useFixedSeed ? "#1a1a0e" : "#1a1815", border: `1px solid ${P_useFixedSeed ? "#4a4520" : "#262320"}`, borderRadius: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: P_useFixedSeed ? 5 : 0 }}>
              <button onClick={() => setP_useFixedSeed(!P_useFixedSeed)}
                style={{ padding: "4px 8px", fontSize: 10, fontWeight: 700, cursor: "pointer", borderRadius: 3, border: "none",
                  background: P_useFixedSeed ? "#ca8a04" : "#333", color: P_useFixedSeed ? "#0a0a09" : "#888" }}>
                {P_useFixedSeed ? "🔒 SEED LOCKED" : "🔓 Random seed"}
              </button>
              <span style={{ fontSize: 10, color: P_useFixedSeed ? "#ca8a04" : "#555" }}>
                {P_useFixedSeed ? `Seed: ${P_seedValue}` : "Different each run"}
              </span>
            </div>
            {P_useFixedSeed && (
              <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
                <input type="number" value={P_seedValue}
                  onChange={e => setP_seedValue(parseInt(e.target.value) || 0)}
                  style={{ flex: 1, fontSize: 11, padding: "4px 6px", borderRadius: 3, border: "1px solid #4a4520", background: "#141210", color: "#f59e0b", fontFamily: "monospace", width: 60 }} />
                <button onClick={() => setP_seedValue(Math.floor(Math.random() * 99999))}
                  style={{ padding: "4px 8px", fontSize: 10, fontWeight: 700, cursor: "pointer", borderRadius: 3, border: "1px solid #4a4520", background: "#1a1815", color: "#ca8a04" }}>
                  NEW
                </button>
              </div>
            )}
          </div>

          {/* P_ Population parameters */}
          <SectionTitle>POPULATION</SectionTitle>
          <ParamSlider label="Households / district" value={P_householdsPerDist} min={0} max={100} onChange={setP_householdsPerDist} />
          <ParamSlider label="% school-age children" value={P_pctSchoolAge} min={0} max={100} onChange={setP_pctSchoolAge} />
          <ParamSlider label="% drive to work after" value={P_pctGoWork} min={0} max={100} onChange={setP_pctGoWork} />

          {/* P_ Traffic parameters */}
          <SectionTitle>TRAFFIC</SectionTitle>
          <ParamSlider label={`Baseline cars/min (≈${Math.round(P_baselineCarsPerMin * 150)} total)`} value={P_baselineCarsPerMin} min={0} max={10} onChange={setP_baselineCarsPerMin} step={0.5} />
          <div style={{ marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: mu }}>Baseline flow: </span>
            <select value={P_baselineFlowMode} onChange={e => setP_baselineFlowMode(e.target.value)}
              style={{ fontSize: 11, padding: "3px 6px", borderRadius: 3, border: "1px solid #262320", background: "#1a1815", color: "#ddd" }}>
              <option value="fixed">Fixed (evenly spaced)</option>
              <option value="uniform">Uniform (random)</option>
              <option value="lognormal">Log-Normal (early peak)</option>
              <option value="reverse_lognormal">Reverse Log-Normal (late peak)</option>
            </select>
          </div>
          <ParamSlider label="Traffic light cycle (min)" value={P_tlCycleMin} min={1} max={10} onChange={setP_tlCycleMin} />
          <ParamSlider label="Out-of-district pref %" value={P_outOfDistPref} min={0} max={100} onChange={setP_outOfDistPref} />
          <div style={{ marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: mu }}>Assignment: </span>
            <select value={P_assignMode} onChange={e => setP_assignMode(e.target.value)}
              style={{ fontSize: 11, padding: "3px 6px", borderRadius: 3, border: "1px solid #262320", background: "#1a1815", color: "#ddd" }}>
              <option value="nearest">Nearest</option>
              <option value="random">Random equal</option>
            </select>
          </div>

          {/* School configuration */}
          <SectionTitle>SCHOOLS {V_selectedDistrict !== null ? `· D${V_selectedDistrict + 1}` : ""}</SectionTitle>
          {V_selectedDistrict !== null ? (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 2 }}>
                {C_SCHOOL_TYPES.map(st => {
                  const active = P_schools[V_selectedDistrict]?.has(st);
                  return (
                    <button key={st} onClick={() => F_toggleSchool(V_selectedDistrict, st)}
                      style={{ padding: "6px 4px", fontSize: 11, fontWeight: 600, borderRadius: 3, cursor: "pointer",
                        background: active ? C_SCHOOL_COLORS[st] : "#1a1815", color: active ? "#fff" : mu,
                        border: `1px solid ${active ? "transparent" : "#262320"}`, opacity: active ? 1 : 0.5 }}>
                      {active ? "✓ " : "✕ "}{C_SCHOOL_LABELS[st]}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 2, marginTop: 3 }}>
                <button onClick={() => setP_schools(p => ({ ...p, [V_selectedDistrict]: new Set(C_SCHOOL_TYPES) }))}
                  style={{ flex: 1, padding: 4, fontSize: 10, background: "#1a1815", border: "1px solid #262320", borderRadius: 2, cursor: "pointer", color: mu }}>Add All</button>
                <button onClick={() => setP_schools(p => ({ ...p, [V_selectedDistrict]: new Set() }))}
                  style={{ flex: 1, padding: 4, fontSize: 10, background: "#2a1111", border: "1px solid #7f1d1d", borderRadius: 2, cursor: "pointer", color: "#fca5a5" }}>Remove All</button>
              </div>
            </>
          ) : (
            <div style={{ color: mu, fontSize: 11, fontStyle: "italic", padding: "6px 0" }}>Click a district on the map</div>
          )}

          {/* School overview grid */}
          <SectionTitle>OVERVIEW</SectionTitle>
          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "2px 6px", fontSize: 10, color: mu }}>
            {Array.from({ length: 9 }, (_, i) => (
              <React.Fragment key={i}>
                <span style={{ color: V_selectedDistrict === i ? "#f59e0b" : mu, fontWeight: V_selectedDistrict === i ? 700 : 400 }}>D{i + 1}</span>
                <span>{P_schools[i]?.size ? [...P_schools[i]].join(" ") : "—"}</span>
              </React.Fragment>
            ))}
          </div>

          {/* A/B Comparison */}
          <SectionTitle>A/B COMPARE</SectionTitle>
          <div style={{ display: "flex", gap: 2 }}>
            <ActionBtn onClick={F_saveScenario} label="SAVE A" accent="#f59e0b" />
            {V_savedScenario && <ActionBtn onClick={() => setV_showComparison(!V_showComparison)} label={V_showComparison ? "HIDE" : "COMPARE"} />}
          </div>
          {V_showComparison && V_savedScenario && V_stats && (
            <div style={{ marginTop: 6, fontSize: 11 }}>
              <div style={{ color: mu, marginBottom: 3 }}>{V_savedScenario.label} → current</div>
              <CompareRow label="Peak arterial" a={V_savedScenario.stats?.S_peakArterial || 0} b={V_stats.S_peakArterial || 0} />
              <CompareRow label="Avg trip (all)" a={parseFloat(V_savedScenario.stats?.S_avgTripAll || 0)} b={parseFloat(V_stats.S_avgTripAll || 0)} />
              <CompareRow label="Avg (arterial)" a={parseFloat(V_savedScenario.stats?.S_avgTripArterial || 0)} b={parseFloat(V_stats.S_avgTripArterial || 0)} />
              <CompareRow label="Avg (baseline)" a={parseFloat(V_savedScenario.stats?.S_avgTripBaseline || 0)} b={parseFloat(V_stats.S_avgTripBaseline || 0)} />
            </div>
          )}

          {/* Model info footer */}
          <div style={{ fontSize: 9, color: "#444", marginTop: 10, lineHeight: 1.6 }}>
            ⚠ Change params → RESET to apply<br />
            5:30–8:00 AM · 1 tick = {P_TICK_SECONDS}s · {P_TOTAL_TICKS} ticks<br />
            Free: {P_FREE_SPEED_KMH}km/h · Min: ~{Math.round(P_FREE_SPEED_KMH * P_MIN_SPEED_FACTOR)}km/h<br />
            TL: {P_tlCycleMin}min = {Math.round(P_tlCycleMin * 60 / P_TICK_SECONDS)} ticks/cycle<br />
            Departure: Normal dist (earlier = more children)
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   REUSABLE UI COMPONENTS
   ═══════════════════════════════════════════════ */

/** ActionBtn: Styled button for simulation controls */
function ActionBtn({ onClick, label, accent }) {
  return (
    <button onClick={onClick}
      style={{ flex: 1, padding: "7px 0", fontSize: 11, fontWeight: 700, letterSpacing: 0.5, cursor: "pointer",
        background: accent || "#1a1815", color: accent ? "#0a0a09" : "#999",
        border: accent ? "none" : "1px solid #262320", borderRadius: 3 }}>
      {label}
    </button>
  );
}

/** ParamSlider: Labeled range slider for P_ parameters */
function ParamSlider({ label, value, min, max, onChange, color = "#f59e0b", step = 1 }) {
  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#6b6560", marginBottom: 2 }}>
        <span>{label}</span>
        <span style={{ fontWeight: 700, color: "#ddd" }}>{value}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{ width: "100%", accentColor: color, height: 4 }} />
    </div>
  );
}

/** SectionTitle: Section header in the control panel */
function SectionTitle({ children }) {
  return (
    <div style={{ fontWeight: 700, fontSize: 10, color: "#555", letterSpacing: 1,
      marginTop: 10, marginBottom: 4, paddingBottom: 2, borderBottom: "1px solid #262320" }}>
      {children}
    </div>
  );
}

/** MetricBadge: Small badge showing a live metric value */
function MetricBadge({ label, value, color }) {
  return (
    <div style={{ background: "#141210", border: "1px solid #1e1c18", borderRadius: 3,
      padding: "3px 6px", display: "flex", gap: 4, alignItems: "center" }}>
      <span style={{ color: "#666", fontSize: 10 }}>{label}</span>
      <span style={{ fontWeight: 700, color: color || "#ddd", fontSize: 12 }}>{value}</span>
    </div>
  );
}

/** CompareRow: Single row in A/B comparison showing delta percentage */
function CompareRow({ label, a, b }) {
  const delta = b - a;
  const pct = a > 0 ? ((delta / a) * 100).toFixed(1) : "—";
  const color = delta > 0 ? "#ef4444" : delta < 0 ? "#22c55e" : "#555";
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 0", fontSize: 11, color: "#6b6560" }}>
      <span>{label}</span>
      <span>{a} → {b} <span style={{ color, fontWeight: 700 }}>({delta > 0 ? "+" : ""}{pct}%)</span></span>
    </div>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ABMTrafficSimulator));
  </script>
</body>
</html>
